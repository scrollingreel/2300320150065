    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@mui/material@5.16.14/umd/material-ui.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; background: #f3f7ff; }
      * { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="react">
      const { useEffect, useMemo, useState } = React;
      const {
        Alert,
        Avatar,
        Box,
        Button,
        Card,
        CardContent,
        Chip,
        CircularProgress,
        Container,
        Divider,
        FormControl,
        Grid,
        InputLabel,
        MenuItem,
        Pagination,
        Paper,
        Select,
        Stack,
        Table,
        TableBody,
        TableCell,
        TableContainer,
        TableHead,
        TableRow,
        Toolbar,
        Typography,
        CssBaseline,
        ThemeProvider,
        createTheme,
        useMediaQuery,
        useTheme
      } = MaterialUI;

      const theme = createTheme({
        palette: {
          primary: { main: '#1d4ed8' },
          secondary: { main: '#0f766e' },
          background: { default: '#f3f7ff', paper: '#ffffff' }
        },
        shape: { borderRadius: 18 },
        typography: { fontFamily: 'Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif' }
      });

      const API_URL = '/api/notifications';
      const TYPES = ['', 'Event', 'Result', 'Placement'];
      const LIMITS = [5, 10, 20, 50];

      function readToken() {
        return window.ACCESS_TOKEN || '';
      }

      function normalizeItems(payload) {
        if (Array.isArray(payload.notifications)) return payload.notifications;
        if (Array.isArray(payload.data)) return payload.data;
        if (Array.isArray(payload.items)) return payload.items;
        return [];
      }

      function getValue(notification, keys, fallback = '') {
        for (const key of keys) {
          if (notification[key] != null && notification[key] !== '') return notification[key];
        }
        return fallback;
      }

      function formatTimestamp(value) {
        if (!value) return '-';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return new Intl.DateTimeFormat('en-IN', { dateStyle: 'medium', timeStyle: 'short' }).format(date);
      }

      async function fetchNotifications({ page, limit, notificationType, signal }) {
        const url = new URL(API_URL, window.location.origin);
        url.searchParams.set('page', String(page));
        url.searchParams.set('limit', String(limit));
        if (notificationType) url.searchParams.set('notification_type', notificationType);

        const response = await fetch(url.toString(), {
          headers: { Authorization: `Bearer ${readToken()}` },
          signal
        });

        if (!response.ok) {
          throw new Error(`Failed to fetch notifications: ${response.status}`);
        }

        const payload = await response.json();
        const total = [payload.total, payload.totalCount, payload.count, payload.metadata?.total, payload.pagination?.total].find((value) => Number.isFinite(Number(value)));

        return {
          items: normalizeItems(payload),
          total: total != null ? Number(total) : null
        };
      }

      function App() {
        const muiTheme = useTheme();
        const isMobile = useMediaQuery(muiTheme.breakpoints.down('md'));
        const [selectedType, setSelectedType] = useState('');
        const [page, setPage] = useState(1);
        const [limit, setLimit] = useState(10);
        const [notifications, setNotifications] = useState([]);
        const [total, setTotal] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState('');

        useEffect(() => {
          const controller = new AbortController();

          (async () => {
            setLoading(true);
            setError('');
            try {
              const response = await fetchNotifications({ page, limit, notificationType: selectedType, signal: controller.signal });
              setNotifications(response.items);
              setTotal(response.total);
            } catch (fetchError) {
              if (fetchError.name !== 'AbortError') {
                setError(fetchError.message || 'Failed to load notifications');
                setNotifications([]);
                setTotal(null);
              }
            } finally {
              if (!controller.signal.aborted) setLoading(false);
            }
          })();

          return () => controller.abort();
        }, [page, limit, selectedType]);

        const totalPages = useMemo(() => (total && limit ? Math.max(1, Math.ceil(total / limit)) : null), [total, limit]);

        const summary = useMemo(() => {
          const counts = notifications.reduce((acc, notification) => {
            const type = getValue(notification, ['notification_type', 'type', 'Type'], 'Unknown');
            acc[type] = (acc[type] || 0) + 1;
            return acc;
          }, { Event: 0, Result: 0, Placement: 0 });

          return [
            { label: 'On page', value: notifications.length },
            { label: 'Placement', value: counts.Placement || 0 },
            { label: 'Result', value: counts.Result || 0 },
            { label: 'Event', value: counts.Event || 0 }
          ];
        }, [notifications]);

        return (
          <ThemeProvider theme={theme}>
            <CssBaseline />
            <Box sx={{ minHeight: '100vh', background: 'radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 32%), linear-gradient(180deg, #eff6ff 0%, #f8fbff 45%, #eef4ff 100%)' }}>
              <Box sx={{ background: 'linear-gradient(135deg, rgba(30,64,175,0.98), rgba(15,118,110,0.96))', color: 'white', borderBottom: '1px solid rgba(15, 23, 42, 0.08)' }}>
                <Container maxWidth="xl" sx={{ py: { xs: 5, md: 7 } }}>
                  <Stack spacing={3}>
                    <Stack spacing={1.25} sx={{ maxWidth: 760 }}>
                      <Chip label="Stage 2 React + MUI" sx={{ alignSelf: 'flex-start', bgcolor: 'rgba(255,255,255,0.15)', color: 'white' }} />
                      <Typography variant="h3" component="h1">Campus Notifications</Typography>
                      <Typography variant="h6" sx={{ fontWeight: 500, color: 'rgba(255,255,255,0.9)' }}>Browse notifications with type filtering and server-side pagination.</Typography>
                    </Stack>
                    <Grid container spacing={2}>
                      {summary.map((stat) => (
                        <Grid item xs={6} md={3} key={stat.label}>
                          <Paper elevation={0} sx={{ p: 2, background: 'rgba(255,255,255,0.12)', backdropFilter: 'blur(12px)', color: 'white', border: '1px solid rgba(255,255,255,0.12)' }}>
                            <Typography variant="body2" sx={{ opacity: 0.85 }}>{stat.label}</Typography>
                            <Typography variant="h5">{stat.value}</Typography>
                          </Paper>
                        </Grid>
                      ))}
                    </Grid>
                  </Stack>
                </Container>
              </Box>

              <Container maxWidth="xl" sx={{ py: { xs: 3, md: 5 } }}>
                <Paper elevation={0} sx={{ p: { xs: 2, md: 3 }, border: '1px solid rgba(15, 23, 42, 0.08)' }}>
                  <Stack spacing={3}>
                    <Stack direction={{ xs: 'column', md: 'row' }} spacing={2} alignItems={{ xs: 'stretch', md: 'center' }} justifyContent="space-between">
                      <Stack spacing={0.5}>
                        <Typography variant="h5">Notification Feed</Typography>
                        <Typography variant="body2" color="text.secondary">Use the filters to load notifications by type and page.</Typography>
                      </Stack>
                      <Stack direction={{ xs: 'column', sm: 'row' }} spacing={2}>
                        <FormControl sx={{ minWidth: 180 }} size="small">
                          <InputLabel id="notification-type-label">Notification Type</InputLabel>
                          <Select labelId="notification-type-label" value={selectedType} label="Notification Type" onChange={(event) => { setSelectedType(event.target.value); setPage(1); }}>
                            {TYPES.map((type) => (
                              <MenuItem key={type || 'all'} value={type}>{type || 'All Types'}</MenuItem>
                            ))}
                          </Select>
                        </FormControl>
                        <FormControl sx={{ minWidth: 140 }} size="small">
                          <InputLabel id="page-size-label">Rows</InputLabel>
                          <Select labelId="page-size-label" value={limit} label="Rows" onChange={(event) => { setLimit(Number(event.target.value)); setPage(1); }}>
                            {LIMITS.map((size) => (
                              <MenuItem key={size} value={size}>{size}</MenuItem>
                            ))}
                          </Select>
                        </FormControl>
                      </Stack>
                    </Stack>

                    {error ? <Alert severity="error">{error}</Alert> : null}

                    {loading ? (
                      <Stack alignItems="center" spacing={2} sx={{ py: 8 }}>
                        <CircularProgress />
                        <Typography color="text.secondary">Loading notifications...</Typography>
                      </Stack>
                    ) : notifications.length === 0 ? (
                      <Paper variant="outlined" sx={{ p: 4, textAlign: 'center' }}>
                        <Typography variant="h6" gutterBottom>No notifications found</Typography>
                        <Typography color="text.secondary">Try a different type or page size.</Typography>
                      </Paper>
                    ) : isMobile ? (
                      <Stack spacing={2}>
                        {notifications.map((notification, index) => {
                          const type = getValue(notification, ['notification_type', 'type', 'Type'], 'Unknown');
                          const message = getValue(notification, ['message', 'Message', 'title'], 'Untitled notification');
                          const timestamp = formatTimestamp(getValue(notification, ['timestamp', 'Timestamp', 'createdAt', 'time'], ''));

                          return (
                            <Card key={getValue(notification, ['id', 'ID', '_id'], `${type}-${index}`)} elevation={0} sx={{ border: '1px solid rgba(29, 78, 216, 0.12)', background: 'linear-gradient(180deg, rgba(255,255,255,0.96), rgba(247,250,255,1))' }}>
                              <CardContent>
                                <Stack spacing={1.5}>
                                  <Stack direction="row" spacing={1.5} alignItems="center" justifyContent="space-between">
                                    <Stack direction="row" spacing={1.5} alignItems="center">
                                      <Avatar sx={{ bgcolor: type === 'Placement' ? '#16a34a' : type === 'Result' ? '#7c3aed' : '#0f766e' }}>{type.charAt(0)}</Avatar>
                                      <Box>
                                        <Typography variant="h6">{type}</Typography>
                                        <Typography variant="body2" color="text.secondary">Notification #{index + 1}</Typography>
                                      </Box>
                                    </Stack>
                                    <Chip label={type} size="small" color="primary" variant="outlined" />
                                  </Stack>
                                  <Typography variant="body1" sx={{ fontWeight: 600 }}>{message}</Typography>
                                  <Divider />
                                  <Typography variant="body2" color="text.secondary">{timestamp}</Typography>
                                </Stack>
                              </CardContent>
                            </Card>
                          );
                        })}
                      </Stack>
                    ) : (
                      <TableContainer component={Paper} elevation={0} sx={{ border: '1px solid rgba(15, 23, 42, 0.08)' }}>
                        <Table>
                          <TableHead>
                            <TableRow sx={{ backgroundColor: 'rgba(29, 78, 216, 0.05)' }}>
                              <TableCell sx={{ fontWeight: 800 }}>Type</TableCell>
                              <TableCell sx={{ fontWeight: 800 }}>Message</TableCell>
                              <TableCell sx={{ fontWeight: 800 }}>Timestamp</TableCell>
                            </TableRow>
                          </TableHead>
                          <TableBody>
                            {notifications.map((notification, index) => {
                              const type = getValue(notification, ['notification_type', 'type', 'Type'], 'Unknown');
                              const message = getValue(notification, ['message', 'Message', 'title'], 'Untitled notification');
                              const timestamp = formatTimestamp(getValue(notification, ['timestamp', 'Timestamp', 'createdAt', 'time'], ''));

                              return (
                                <TableRow key={getValue(notification, ['id', 'ID', '_id'], `${type}-${index}`)} hover>
                                  <TableCell>
                                    <Chip label={type} color={type === 'Placement' ? 'success' : type === 'Result' ? 'secondary' : 'info'} size="small" variant="outlined" />
                                  </TableCell>
                                  <TableCell sx={{ maxWidth: 520, fontWeight: 600 }}>{message}</TableCell>
                                  <TableCell>{timestamp}</TableCell>
                                </TableRow>
                              );
                            })}
                          </TableBody>
                        </Table>
                      </TableContainer>
                    )}

                    <Toolbar disableGutters sx={{ px: 0, flexWrap: 'wrap', gap: 2, justifyContent: 'space-between' }}>
                      <Typography variant="body2" color="text.secondary">
                        Showing {notifications.length} item{notifications.length === 1 ? '' : 's'}{total != null ? ` out of ${total}` : ''}
                      </Typography>
                      {totalPages ? (
                        <Pagination count={totalPages} page={page} onChange={(_, value) => setPage(value)} color="primary" shape="rounded" />
                      ) : (
                        <Stack direction="row" spacing={1}>
                          <Button variant="outlined" disabled={page <= 1} onClick={() => setPage((value) => Math.max(1, value - 1))}>Previous</Button>
                          <Button variant="contained" disabled={notifications.length < limit} onClick={() => setPage((value) => value + 1)}>Next</Button>
                        </Stack>
                      )}
                    </Toolbar>
                  </Stack>
                </Paper>
              </Container>
            </Box>
          </ThemeProvider>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
